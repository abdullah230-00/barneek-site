server {
    # CSP Headers for security
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://ilcbluyhkljehkcgqfjm.supabase.co; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://ilcbluyhkljehkcgqfjm.supabase.co https://*.supabase.co;" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # React Router SPA
  location / {
    try_files $uri $
